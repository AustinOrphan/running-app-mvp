name: 🚀 Performance Monitoring

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly performance audits
    - cron: '0 9 * * MON'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse-ci:
    name: 🔍 Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🗄️ Setup database
        run: |
          npx prisma migrate deploy
          npx prisma generate

      - name: 🏗️ Build application
        run: npm run build

      - name: 🌐 Start application
        run: |
          npm start &
          sleep 10
          curl -f http://localhost:3000 || exit 1
        env:
          NODE_ENV: production
          DATABASE_URL: file:./dev.db
          JWT_SECRET: test-secret-for-ci

      - name: 🔍 Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: '.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  bundle-analysis:
    name: 📦 Bundle Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🗄️ Setup database
        run: |
          npx prisma migrate deploy
          npx prisma generate

      - name: 🏗️ Build and analyze bundle
        run: |
          npm run build
          npx vite-bundle-analyzer dist --open-analyzer false --analyzer-mode json

      - name: 📊 Upload bundle analysis
        uses: actions/upload-artifact@v6
        with:
          name: bundle-analysis
          path: bundle-report.json
          retention-days: 30

  performance-benchmarks:
    name: ⚡ Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🗄️ Setup database
        run: |
          npx prisma migrate deploy
          npx prisma generate

      - name: ⚡ Run performance benchmarks
        run: npm run test:performance
        continue-on-error: true

      - name: 📊 Upload benchmark results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: performance-benchmarks
          path: benchmark-results/
          retention-days: 30

  memory-leak-detection:
    name: 🧠 Memory Leak Detection
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🗄️ Setup database
        run: |
          npx prisma migrate deploy
          npx prisma generate

      - name: 🧠 Run memory leak tests
        run: npm run test:memory
        continue-on-error: true

      - name: 📊 Upload memory analysis
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: memory-analysis
          path: memory-reports/
          retention-days: 30

  performance-report:
    name: 📊 Performance Report
    runs-on: ubuntu-latest
    needs: [lighthouse-ci, bundle-analysis, performance-benchmarks, memory-leak-detection]
    if: always()
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4

      - name: 📊 Generate performance report
        run: |
          echo "# 🚀 Performance Report" > performance-report.md
          echo "" >> performance-report.md
          echo "## 📊 Summary" >> performance-report.md
          echo "- **Lighthouse CI**: $([ -f lighthouse-ci/results.json ] && echo '✅ Completed' || echo '❌ Failed')" >> performance-report.md
          echo "- **Bundle Analysis**: $([ -f bundle-analysis/bundle-report.json ] && echo '✅ Completed' || echo '❌ Failed')" >> performance-report.md
          echo "- **Performance Benchmarks**: $([ -d performance-benchmarks ] && echo '✅ Completed' || echo '❌ Failed')" >> performance-report.md
          echo "- **Memory Leak Detection**: $([ -d memory-analysis ] && echo '✅ Completed' || echo '❌ Failed')" >> performance-report.md
          echo "" >> performance-report.md
          echo "Generated on: $(date)" >> performance-report.md

      - name: 📝 Comment performance report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('performance-report.md')) {
              const report = fs.readFileSync('performance-report.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }

      - name: 📊 Upload performance report
        uses: actions/upload-artifact@v6
        with:
          name: performance-report
          path: performance-report.md
          retention-days: 30
